<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // Single Page App redirect for GitHub Pages
    // Redirects 404 requests to index.html for client-side routing
    const segment = 1; // Number of path segments to keep (repo name)
    const path = window.location.pathname.split('/').slice(segment + 1).join('/');
    const search = window.location.search;
    const hash = window.location.hash;

    if (path || search || hash) {
      sessionStorage.setItem('spa-redirect', path + search + hash);
    }

    // Redirect to the base URL
    const base = window.location.pathname.split('/').slice(0, segment + 1).join('/') + '/';
    window.location.replace(base);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
